services:
  gateway:
    build:
      context: .
      target: runtime
    stop_grace_period: 15s
    ports:
      - "8080:8080"
    environment:
      - CONFIG_PATH=config/backends.yaml
      - LOG_LEVEL=info
      - TENANT_ALPHA_KEY=test-alpha-key
      - TENANT_BETA_KEY=test-beta-key
      - OPENAI_API_KEY=test-openai-key
      - ANTHROPIC_API_KEY=test-anthropic-key
      - REDIS_URL=redis://redis:6379/0
      - CACHE_TTL=3600
      - CACHE_SIMILARITY_THRESHOLD=0.95
      - QUEUE_MAX_DEPTH=100
      - QUEUE_TIMEOUT=30
      - L1_MAX_ENTRIES=500
      - L1_TTL=3600
    deploy:
      resources:
        limits:
          memory: 2G
    volumes:
      - ./config:/app/config:ro
    depends_on:
      ollama:
        condition: service_started
      ollama-2:
        condition: service_started
      redis:
        condition: service_healthy
      mock-openai-1:
        condition: service_started
      mock-anthropic-1:
        condition: service_started
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh:ro
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

  ollama-2:
    image: ollama/ollama
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    volumes:
      - ollama_data_2:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh:ro
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mock-openai-1:
    image: zerob13/mock-openai-api:latest
    ports:
      - "9001:3000"

  mock-openai-2:
    image: zerob13/mock-openai-api:latest
    ports:
      - "9002:3000"

  mock-openai-3:
    image: zerob13/mock-openai-api:latest
    ports:
      - "9003:3000"

  mock-openai-4:
    image: zerob13/mock-openai-api:latest
    ports:
      - "9004:3000"

  mock-openai-5:
    image: zerob13/mock-openai-api:latest
    ports:
      - "9005:3000"

  mock-anthropic-1:
    image: zerob13/mock-openai-api:latest
    ports:
      - "9006:3000"

  mock-anthropic-2:
    image: zerob13/mock-openai-api:latest
    ports:
      - "9007:3000"

  mock-anthropic-3:
    image: zerob13/mock-openai-api:latest
    ports:
      - "9008:3000"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - gateway
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  ollama_data:
  ollama_data_2:

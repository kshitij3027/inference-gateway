services:
  gateway:
    build:
      context: .
      target: runtime
    ports:
      - "8080:8080"
    environment:
      - CONFIG_PATH=config/backends.yaml
      - LOG_LEVEL=info
      - TENANT_ALPHA_KEY=test-alpha-key
      - TENANT_BETA_KEY=test-beta-key
    volumes:
      - ./config:/app/config:ro
    depends_on:
      ollama:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh:ro
    environment:
      - OLLAMA_HOST=0.0.0.0:11434

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  ollama_data:

upstream gateway_cluster {
    server gateway-1:8080 max_fails=3 fail_timeout=10s;
    server gateway-2:8080 max_fails=3 fail_timeout=10s;
    server gateway-3:8080 max_fails=3 fail_timeout=10s;
}

server {
    listen 80;
    server_name _;

    # Disable buffering for SSE streaming support
    proxy_buffering off;

    location / {
        proxy_pass http://gateway_cluster;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';

        # LLM calls can be slow; streaming can last minutes
        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
    }

    location /nginx-health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
